name: AI Review Gate

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  checks: write
  contents: read
  pull-requests: read

jobs:
  ai-review:
    name: Sync AI Review status
    if: ${{ github.event.pull_request.base.ref == 'master' && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Sync AI Review check on current head
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request?.number;
            const checkName = 'AI Review';

            if (!prNumber) {
              core.setFailed('This workflow requires a pull request payload.');
              return;
            }

            const copilotLogins = new Set([
              'copilot',
              'github-copilot',
              'github-copilot[bot]',
              'copilot-pull-request-reviewer',
              'copilot-pull-request-reviewer[bot]',
            ]);

            function isCopilotUser(user) {
              const login = user?.login?.toLowerCase();
              if (!login) {
                return false;
              }

              return copilotLogins.has(login) || login.includes('copilot');
            }

            async function getPullRequest() {
              const { data } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });

              return data;
            }

            async function findCopilotSignal(headSha, pullRequestUrl) {
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              });

              const review = reviews.find(item =>
                isCopilotUser(item.user) && item.commit_id === headSha,
              );

              if (review) {
                return {
                  kind: 'review',
                  login: review.user.login,
                  url: review.html_url ?? `${pullRequestUrl}#pullrequestreview-${review.id}`,
                };
              }

              const comments = await github.paginate(github.rest.pulls.listReviewComments, {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              });

              const comment = comments.find(item =>
                isCopilotUser(item.user) && item.commit_id === headSha,
              );

              if (comment) {
                return {
                  kind: 'review comment',
                  login: comment.user.login,
                  url: comment.html_url,
                };
              }

              return null;
            }

            async function findExistingCheckRun(headSha) {
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: headSha,
                check_name: checkName,
                per_page: 100,
              });

              const [latestRun] = [...(data.check_runs ?? [])].sort((left, right) => right.id - left.id);
              return latestRun ?? null;
            }

            async function createCheckRun(headSha, payload) {
              return github.rest.checks.create({
                owner,
                repo,
                name: checkName,
                head_sha: headSha,
                details_url: `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`,
                ...payload,
              });
            }

            async function updateCheckRun(checkRunId, payload) {
              return github.rest.checks.update({
                owner,
                repo,
                check_run_id: checkRunId,
                details_url: `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`,
                ...payload,
              });
            }

            async function setWaitingForReview(headSha) {
              const existingCheckRun = await findExistingCheckRun(headSha);
              const payload = {
                status: 'in_progress',
                started_at: new Date().toISOString(),
                output: {
                  title: 'Waiting for Copilot review',
                  summary:
                    `PR #${prNumber} is waiting for GitHub Copilot to review head ${headSha}. ` +
                    'The required AI Review check will turn green after Copilot leaves a review or review comment on this commit.',
                },
              };

              if (existingCheckRun?.status !== 'completed') {
                if (existingCheckRun) {
                  await updateCheckRun(existingCheckRun.id, payload);
                } else {
                  await createCheckRun(headSha, payload);
                }
                return;
              }

              await createCheckRun(headSha, payload);
            }

            async function setReviewSatisfied(headSha, signal) {
              const existingCheckRun = await findExistingCheckRun(headSha);
              const payload = {
                status: 'completed',
                conclusion: 'success',
                completed_at: new Date().toISOString(),
                output: {
                  title: 'Copilot review found',
                  summary:
                    `Found a Copilot ${signal.kind} from ${signal.login} for head ${headSha}: ${signal.url}`,
                },
              };

              if (existingCheckRun?.status === 'completed') {
                await createCheckRun(headSha, payload);
                return;
              }

              if (existingCheckRun) {
                await updateCheckRun(existingCheckRun.id, payload);
                return;
              }

              await createCheckRun(headSha, payload);
            }

            const pullRequest = await getPullRequest();
            const { head, html_url: pullRequestUrl } = pullRequest;
            const signal = await findCopilotSignal(head.sha, pullRequestUrl);

            if (!signal) {
              await setWaitingForReview(head.sha);
              core.info(`No Copilot review found for ${head.sha}; leaving ${checkName} in progress.`);
              return;
            }

            await setReviewSatisfied(head.sha, signal);
            core.info(`Found Copilot ${signal.kind} from ${signal.login} for ${head.sha}: ${signal.url}`);
