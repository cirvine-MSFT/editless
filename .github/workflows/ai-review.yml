name: AI Review Gate

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    branches: [master]
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    branches: [master]
    types: [created, edited, deleted]

permissions:
  contents: read
  pull-requests: read

jobs:
  ai-review:
    name: AI Review
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Require Copilot review on current head
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request?.number;

            if (!prNumber) {
              core.setFailed('This workflow requires a pull request payload.');
              return;
            }

            const copilotLogins = new Set([
              'copilot',
              'github-copilot',
              'github-copilot[bot]',
              'copilot-pull-request-reviewer',
              'copilot-pull-request-reviewer[bot]',
            ]);

            function isCopilotUser(user) {
              const login = user?.login?.toLowerCase();
              if (!login) {
                return false;
              }

              return copilotLogins.has(login) || login.includes('copilot');
            }

            async function getPullRequest() {
              const { data } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });

              return data;
            }

            async function findCopilotSignal(headSha) {
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              });

              const review = reviews.find(item =>
                isCopilotUser(item.user) && item.commit_id === headSha,
              );

              if (review) {
                return {
                  kind: 'review',
                  login: review.user.login,
                  url: review.html_url ?? `${context.payload.pull_request.html_url}#pullrequestreview-${review.id}`,
                };
              }

              const comments = await github.paginate(github.rest.pulls.listReviewComments, {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              });

              const comment = comments.find(item =>
                isCopilotUser(item.user) && item.commit_id === headSha,
              );

              if (comment) {
                return {
                  kind: 'review comment',
                  login: comment.user.login,
                  url: comment.html_url,
                };
              }

              return null;
            }

            const shouldPoll = context.eventName === 'pull_request';
            const timeoutAt = Date.now() + 4 * 60 * 1000;
            let pullRequest = await getPullRequest();
            let signal = await findCopilotSignal(pullRequest.head.sha);

            while (!signal && shouldPoll && Date.now() < timeoutAt) {
              core.info(`No Copilot review for ${pullRequest.head.sha} yet; waiting 15 seconds...`);
              await new Promise(resolve => setTimeout(resolve, 15_000));
              pullRequest = await getPullRequest();
              signal = await findCopilotSignal(pullRequest.head.sha);
            }

            if (!signal) {
              core.setFailed(
                `No Copilot review found for PR #${prNumber} on head ${pullRequest.head.sha}. ` +
                'This gate requires an automated Copilot review before merge.'
              );
              return;
            }

            core.info(
              `Found Copilot ${signal.kind} from ${signal.login} for ${pullRequest.head.sha}: ${signal.url}`
            );
